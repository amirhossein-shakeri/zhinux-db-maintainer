##################################
# NETWORK
##################################

# Bind only localhost if Redis is used internally.
# For docker compose services you can also bind 0.0.0.0
# bind 0.0.0.0

# Default Redis port
# port 6379
# Disable protected mode if using internal docker networking.
# Keep enabled if exposed to internet.
# protected-mode yes
# TCP keepalive helps detect dead clients
tcp-keepalive 300


##################################
# GENERAL
##################################
# Run Redis in background (not required in docker but safe)
# daemonize no
# Process supervision (not needed in Docker)
# supervised no
# Log level: debug | verbose | notice | warning
loglevel notice

# Log file location
logfile ""

# Number of databases (logical partitions)
databases 16


##################################
# MEMORY MANAGEMENT
##################################
# Maximum memory Redis can use
# Adjust depending on host memory 2gb
maxmemory 128mb

# What Redis should do when memory is full
# Recommended for caching workloads
maxmemory-policy allkeys-lru

# Other options:
# noeviction
# volatile-lru
# volatile-ttl
# allkeys-random

##################################
# PERSISTENCE (RDB SNAPSHOTS)
##################################
# Snapshot rules:
# save <seconds> <writes>
# Save after 1 change in 15 minutes
save 900 1

# Save after 10 changes in 5 minutes
save 300 10

# Save after 10000 changes in 1 minute
save 60 10000

# File name for RDB snapshot
dbfilename dump.rdb

# Directory where data files are stored
dir /data

# Stop writes if snapshot fails (protects data)
stop-writes-on-bgsave-error yes

# Compress RDB snapshot
rdbcompression yes

# Add CRC64 checksum
rdbchecksum yes

# Enable memory fragmentation mitigation
activedefrag yes


##################################
# AOF PERSISTENCE
##################################
# Enable append-only persistence
appendonly yes

# File name
appendfilename "appendonly.aof"

# Sync strategy:
# always    = safest but slow
# everysec  = recommended
# no        = fastest but risky
appendfsync everysec

# Avoid fsync during rewrite
no-appendfsync-on-rewrite yes

# Rewrite AOF when file grows too large
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Use RDB snapshot as base when rewriting AOF
aof-use-rdb-preamble yes


##################################
# PERFORMANCE
##################################
# Maximum simultaneous connections
maxclients 10000

# Disable slow commands if needed
# rename-command FLUSHALL ""

##################################
# SECURITY
##################################
# Require password (strongly recommended)
# Uncomment and change:
# requirepass yourStrongPasswordHere
# Rename dangerous commands
# rename-command FLUSHALL ""
# rename-command CONFIG ""
##################################
# LATENCY & PERFORMANCE
##################################
# Enables latency monitoring
latency-monitor-threshold 100

# Slow log threshold in microseconds
slowlog-log-slower-than 10000

# Number of slowlog entries
slowlog-max-len 128


##################################
# CLIENTS
##################################
# Timeout idle clients
timeout 0

# Limit output buffers
client-output-buffer-limit normal 0 0 0


##################################
# THREADING (Redis 6+)
##################################
# Enable IO threading
io-threads 4
io-threads-do-reads yes
