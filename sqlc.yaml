version: "2"

sql:
  - engine: "postgresql"

    schema:
      - "db/postgres/schema.sql"

    queries:
      - "db/postgres/queries/**/*.sql"
      # - "db/postgres/queries" # error parsing queries: no queries contained in paths db/postgres/queries
      # - "db/postgres/queries/backup"
      # - "db/postgres/queries/database"
      # - "db/postgres/queries/restore"

    gen:
      go:
        package: "dbq"
        out: "internal/adapters/persistence/postgres/gen"
        sql_package: "pgx/v5"

        emit_interface: true
        emit_json_tags: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true

